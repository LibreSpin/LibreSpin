name: Build CalcPad CE CLI
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish self-contained Cli
        run: |
          dotnet publish Calcpad.Cli/Calcpad.Cli.csproj \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -c Release \
            -o ./dist/
      - name: Rename to Cli (assembly name on Linux)
        run: |
          ls -la ./dist/
          # Binary is already named 'Cli' per spike finding; this step is a safety check
          test -f ./dist/Cli || mv ./dist/Calcpad.Cli ./dist/Cli
          chmod +x ./dist/Cli
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/Cli
