schema_version: 1

project_name: "Environmental Monitoring Sensor Node"
use_case: "Outdoor environmental monitoring — compact, battery-powered sensor node that measures temperature and humidity, transmitting data hourly via LoRaWAN for multi-year deployment in North American outdoor environments"

environment:
  location: "outdoor_moderate"
  temperature_min_c: -10
  temperature_max_c: 40
  ip_rating: "IP65"
  notes: "Weatherproof, dust-tight, water jet protection"

sensors:
  - type: "temperature"
    accuracy: "+-1-2%"
    priority: "critical"
  - type: "humidity"
    accuracy: "+-1-2%"
    priority: "critical"

connectivity:
  primary: "LoRaWAN"
  region: "US915"
  data_rate: "hourly"
  latency: "soft_real_time"
  port_count: "N/A"
  hub_acceptable: "N/A"

power:
  source: "battery_lipo_18650"
  battery_life_target: "years"
  notes: "Ultra-low-power operation required for 2+ year battery life on single 18650"

hmi:
  buttons: 0
  leds: 0
  display: "none"

physical:
  max_pcb_size_mm: 30
  enclosure: "IP65"
  form_factor: "very_small"

success_criteria:
  - "Battery life minimum 2+ years on single 18650 LiPo"
  - "BOM cost under $25 at low volume (1-10 units)"
  - "Fits in <30mm enclosure"
  - "FCC certified path clear — use pre-certified LoRa module"
  - "Ready for schematic capture with verified parts"
  - "Prototype BOM with lead times from DigiKey/Mouser"
  - "Reference designs identified for key components"
  - "Power budget analysis for battery life verification"
  - "Accept new parts from established vendors (TI, Nordic, STM)"
  - "Single-source acceptable if no alternative exists"
  - "Priority: Battery life > Cost > Size (but cost wins in direct trade-off)"
  - "Optimize for maximum battery life as primary design goal"
  - "Lower cost preferred over longer battery life when forced to choose"
